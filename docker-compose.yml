version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payout_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/payout_engine
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A config worker -l info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/payout_engine
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  beat:
    build: .
    command: celery -A config beat -l info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/payout_engine
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  pgdata:
